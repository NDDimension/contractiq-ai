services:
  contractiq:
    build: .
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      PORT: 5000
      FLASK_DEBUG: 0
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
